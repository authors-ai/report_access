<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marlowe Data Query</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f6f9;
      --surface:   #ffffff;
      --border:    #dde2ec;
      --accent:    #2563eb;
      --accent2:   #0891b2;
      --danger:    #dc2626;
      --success:   #16a34a;
      --text:      #111827;
      --muted:     #6b7280;
      --label:     #374151;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .logo {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--accent);
    }
    .logo span { color: var(--accent2); }
    #status-badge {
      font-family: var(--mono);
      font-size: .72rem;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
    }
    #status-badge.ok  { border-color: var(--success); color: var(--success); background: #f0fdf4; }
    #status-badge.err { border-color: var(--danger);  color: var(--danger);  background: #fef2f2; }

    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-label {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--label);
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: .8rem;
      padding: 8px 10px;
      border-radius: 6px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 14px;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: #fff;
    }
    input::placeholder { color: #9ca3af; }

    .btn {
      font-family: var(--sans);
      font-size: .85rem;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      padding: 10px 16px;
      cursor: pointer;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      width: 100%;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 3px rgba(37,99,235,.3); }
    .btn-primary:hover { box-shadow: 0 4px 12px rgba(37,99,235,.35); }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); margin-top: 8px; }
    .btn-secondary:hover { background: var(--bg); color: var(--label); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .results-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }
    .results-header h2 { font-size: .95rem; font-weight: 600; color: var(--text); }
    #row-count { font-family: var(--mono); font-size: .75rem; color: var(--muted); }

    .btn-export {
      font-family: var(--sans);
      font-size: .8rem;
      font-weight: 600;
      padding: 7px 16px;
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-export:hover { opacity: .85; }
    .btn-export:disabled { opacity: .35; cursor: not-allowed; }

    #table-wrap { flex: 1; overflow: auto; padding: 16px; overflow-x: auto; }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      font-size: .8rem;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      table-layout: fixed;
    }
    thead th {
      font-family: var(--mono);
      font-size: .68rem;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #fff;
      background: #1e40af;
      padding: 11px 16px;
      text-align: left;
      border-bottom: 2px solid #1d3fb0;
      position: sticky;
      top: 0;
      z-index: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
    }
    .col-resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      cursor: col-resize;
      background: transparent;
      z-index: 2;
    }
    .col-resize-handle:hover,
    .col-resize-handle.active {
      background: rgba(255,255,255,.35);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #eff6ff; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:nth-child(even):hover { background: #eff6ff; }
    tbody td {
      padding: 9px 16px;
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--text);
      white-space: nowrap;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    tbody td.null-val { color: #9ca3af; font-style: italic; }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }
    #empty-state .icon { font-size: 2.4rem; opacity: .4; }
    #empty-state p { font-size: .85rem; color: var(--muted); }

    #error-msg {
      display: none;
      margin: 24px;
      padding: 14px 18px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: var(--danger);
      font-family: var(--mono);
      font-size: .8rem;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">MARLOWE<span>.</span>query</div>
  <div id="status-badge">● idle</div>
</header>

<main>
  <aside>
    <div>
      <div class="section-label">Connection</div>
      <label>API URL</label>
      <input type="text" id="api-url" placeholder="https://xxx.execute-api.us-east-1.amazonaws.com"/>
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="your-api-key"/>
    </div>
    <div>
      <div class="section-label">Filters</div>
      <label>Version ID</label>
      <input type="text" id="f-versionId" placeholder="UUID"/>
      <label>Title ID</label>
      <input type="text" id="f-titleId" placeholder="UUID"/>
      <label>Email</label>
      <input type="text" id="f-email" placeholder="user@example.com"/>
      <label>Created After</label>
      <input type="date" id="f-createdAtFrom"/>
      <label>Created Before</label>
      <input type="date" id="f-createdAtTo"/>
      <label>Limit</label>
      <input type="number" id="f-limit" value="100" min="1"/>
    </div>
    <div>
      <button class="btn btn-primary" id="btn-run">Run Query</button>
      <button class="btn btn-secondary" id="btn-clear">Clear Filters</button>
    </div>
  </aside>

  <div id="results-pane">
    <div class="results-header">
      <h2>Results</h2>
      <div style="display:flex;align-items:center;gap:16px;">
        <span id="row-count"></span>
        <button class="btn-export" id="btn-export" disabled>⬇ Save CSV</button>
      </div>
    </div>
    <div id="error-msg"></div>
    <div id="empty-state">
      <div class="icon">🔍</div>
      <p>Configure connection &amp; run a query</p>
    </div>
    <div id="table-wrap" style="display:none;"></div>
  </div>
</main>

<script>
  const urlInput = document.getElementById('api-url');
  const keyInput = document.getElementById('api-key');

  urlInput.value = localStorage.getItem('marlowe_url') || '';
  keyInput.value = localStorage.getItem('marlowe_key') || '';

  urlInput.addEventListener('change', () => localStorage.setItem('marlowe_url', urlInput.value.trim()));
  keyInput.addEventListener('change', () => localStorage.setItem('marlowe_key', keyInput.value.trim()));

  let lastResults = [];

  document.getElementById('btn-run').addEventListener('click', runQuery);

  async function runQuery() {
    const baseUrl = urlInput.value.trim().replace(/\/$/, '');
    const apiKey  = keyInput.value.trim();
    if (!baseUrl || !apiKey) { showError('Please enter both an API URL and API Key.'); return; }

    const params = new URLSearchParams();
    const v = id => document.getElementById(id).value.trim();
    if (v('f-versionId'))     params.set('versionId',       v('f-versionId'));
    if (v('f-titleId'))       params.set('titleId',          v('f-titleId'));
    if (v('f-email'))         params.set('properties.email', v('f-email'));
    if (v('f-createdAtFrom')) params.set('createdAtFrom',    v('f-createdAtFrom'));
    if (v('f-createdAtTo'))   params.set('createdAtTo',      v('f-createdAtTo'));
    if (v('f-limit'))         params.set('limit',            v('f-limit'));

    setStatus('loading');
    hideError();

    try {
      const res = await fetch(`${baseUrl}/versions?${params.toString()}`, { headers: { 'x-api-key': apiKey } });
      if (res.status === 401) throw new Error('Unauthorized — check your API key.');
      if (!res.ok) throw new Error(`Server error: ${res.status} ${res.statusText}`);
      const data = await res.json();
      lastResults = Array.isArray(data) ? data : [];
      renderTable(lastResults);
      setStatus('ok', lastResults.length);
    } catch (err) {
      showError(err.message);
      setStatus('err');
    }
  }

  function renderTable(rows) {
    const wrap = document.getElementById('table-wrap');
    const empty = document.getElementById('empty-state');
    const exportBtn = document.getElementById('btn-export');
    const rowCount = document.getElementById('row-count');
    wrap.innerHTML = '';
    if (!rows.length) {
      wrap.style.display = 'none';
      empty.style.display = 'flex';
      empty.querySelector('p').textContent = 'No results found.';
      exportBtn.disabled = true;
      rowCount.textContent = '0 rows';
      return;
    }
    const keys = [...new Set(rows.flatMap(r => Object.keys(r)))];
    const table = document.createElement('table');
    const thead = table.createTHead();
    const hr = thead.insertRow();
    keys.forEach(k => {
      const th = document.createElement('th');
      th.textContent = k;
      th.style.width = '180px';
      const handle = document.createElement('div');
      handle.className = 'col-resize-handle';
      th.appendChild(handle);
      hr.appendChild(th);
    });
    const tbody = table.createTBody();
    rows.forEach(row => {
      const tr = tbody.insertRow();
      keys.forEach(k => {
        const td = tr.insertCell();
        const val = row[k];
        if (val === null || val === undefined) { td.textContent = '—'; td.classList.add('null-val'); }
        else if (typeof val === 'object') { td.textContent = JSON.stringify(val); }
        else { td.textContent = String(val); }
      });
    });
    wrap.appendChild(table);
    wrap.style.display = 'block';
    empty.style.display = 'none';
    exportBtn.disabled = false;
    rowCount.textContent = `${rows.length} row${rows.length !== 1 ? 's' : ''}`;
  }

  document.getElementById('btn-export').addEventListener('click', () => {
    if (!lastResults.length) return;
    const keys = [...new Set(lastResults.flatMap(r => Object.keys(r)))];
    const escape = v => {
      if (v === null || v === undefined) return '';
      const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const lines = [keys.join(','), ...lastResults.map(r => keys.map(k => escape(r[k])).join(','))];
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `marlowe-export-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    ['f-versionId','f-titleId','f-email','f-createdAtFrom','f-createdAtTo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-limit').value = '100';
  });

  function setStatus(state, count) {
    const badge = document.getElementById('status-badge');
    const btn = document.getElementById('btn-run');
    if (state === 'loading') { badge.textContent = '● querying…'; badge.className = ''; btn.innerHTML = '<span class="spinner"></span>Running…'; btn.disabled = true; }
    else if (state === 'ok') { badge.textContent = `● ${count} rows returned`; badge.className = 'ok'; btn.textContent = 'Run Query'; btn.disabled = false; }
    else { badge.textContent = '● error'; badge.className = 'err'; btn.textContent = 'Run Query'; btn.disabled = false; }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = `⚠ ${msg}`;
    el.style.display = 'block';
    document.getElementById('table-wrap').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
  }

  function hideError() { document.getElementById('error-msg').style.display = 'none'; }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });

  /* Column resize logic */
  (function() {
    let activeHandle = null, startX = 0, startW = 0, th = null;
    document.addEventListener('mousedown', e => {
      if (!e.target.classList.contains('col-resize-handle')) return;
      activeHandle = e.target;
      activeHandle.classList.add('active');
      th = activeHandle.parentElement;
      startX = e.pageX;
      startW = th.offsetWidth;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!activeHandle) return;
      const w = Math.max(60, startW + (e.pageX - startX));
      th.style.width = w + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!activeHandle) return;
      activeHandle.classList.remove('active');
      activeHandle = null;
      th = null;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  })();
</script>
</body>
</html>
